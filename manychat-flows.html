<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Furniture — ManyChat Flow Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e1a;font-family:'Segoe UI',Tahoma,Arial,sans-serif;overflow:hidden;user-select:none}

/* ── Toolbar ─────────────────────────────────────────────── */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:#13131f;border-bottom:1px solid #2a2a3e;
  display:flex;align-items:center;padding:0 18px;gap:14px;z-index:1000
}
.brand{font-size:14px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px}
.brand-sub{font-size:11px;color:#5a5a7a;font-weight:400}
.spacer{flex:1}
.url-badge{
  font-size:10px;font-family:monospace;
  background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.25);
  color:#5eead4;padding:4px 10px;border-radius:6px;direction:ltr
}
.tb-btn{
  background:#252535;border:1px solid #3a3a4e;border-radius:8px;
  color:#a0a0c0;font-size:11px;padding:5px 12px;cursor:pointer
}
.tb-btn:hover{background:#303048;color:#fff}

/* ── Canvas ──────────────────────────────────────────────── */
#wrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab;
  background-color:#0e0e1a;
  background-image:radial-gradient(#2a2a3a 1px,transparent 1px);
  background-size:22px 22px
}
#wrap.drag{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* ── Section labels ──────────────────────────────────────── */
.sec-label{
  position:absolute;font-size:10px;font-weight:900;
  letter-spacing:.18em;text-transform:uppercase;color:#2e2e4a;pointer-events:none
}

/* ── Node ────────────────────────────────────────────────── */
.nd{
  position:absolute;width:258px;
  background:#191926;border:1.5px solid #2a2a3e;
  border-radius:14px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:box-shadow .15s,border-color .15s;
  cursor:pointer
}
.nd:hover{box-shadow:0 8px 32px rgba(0,0,0,.7)}
.nd.done   {border-color:rgba(16,185,129,.45)}
.nd.partial{border-color:rgba(245,158,11,.45)}
.nd.missing{border-color:rgba(239,68,68,.45)}
.nd.system {border-color:rgba(168,85,247,.45)}
.nd.active {box-shadow:0 0 0 2px #6366f1,0 8px 32px rgba(99,102,241,.3)}

/* Node header */
.nd-head{
  display:flex;align-items:center;gap:7px;
  padding:9px 12px;border-bottom:1px solid #222234;font-size:11px
}
.nd-platform{
  font-size:9px;font-weight:900;letter-spacing:.06em;
  padding:2px 6px;border-radius:4px;
}
.pl-fb  {background:rgba(59,130,246,.18);color:#60a5fa}
.pl-act {background:rgba(245,158,11,.18);color:#fbbf24}
.pl-trig{background:rgba(168,85,247,.18);color:#c084fc}
.pl-sys {background:rgba(168,85,247,.18);color:#c084fc}
.nd-name{font-size:12px;font-weight:900;color:#e0e0f0;flex:1;direction:rtl;text-align:right}
.nd-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.done .nd-dot   {background:#10b981}
.partial .nd-dot{background:#f59e0b}
.missing .nd-dot{background:#ef4444}
.system .nd-dot {background:#a855f7}

/* Node body */
.nd-body{padding:9px 10px;display:flex;flex-direction:column;gap:7px}

/* Row inside body */
.nr{background:#20202e;border-radius:8px;padding:7px 9px;font-size:11px}
.nr-lbl{
  font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  color:#4a4a6a;margin-bottom:4px;display:flex;align-items:center;gap:4px;direction:rtl
}
.nr-txt{color:#b0b0cc;line-height:1.5;direction:rtl;text-align:right;white-space:pre-wrap}
.nr-txt.ok  {color:#10b981}
.nr-txt.warn{color:#f59e0b}
.nr-txt.err {color:#ef4444}
.nr-txt.info{color:#818cf8}
.nr-code{
  font-family:monospace;font-size:10px;direction:ltr;text-align:left;
  background:#121220;border-radius:5px;padding:5px 7px;margin-top:4px;
  color:#a5d6ff;white-space:pre;overflow-x:auto
}

/* Buttons list */
.btn-list{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.fb-btn{
  background:#151522;border:1px solid #303048;border-radius:20px;
  padding:5px 10px 5px 6px;font-size:10px;color:#8080a8;
  direction:rtl;text-align:right;display:flex;align-items:center;justify-content:space-between;
  transition:border-color .15s,color .15s;cursor:default
}
.fb-btn .port-out{
  width:10px;height:10px;border-radius:50%;border:2px solid #303048;
  background:#0e0e1a;flex-shrink:0;margin-right:auto;margin-left:4px;
  transition:border-color .15s,background .15s
}
.fb-btn.conn .port-out{border-color:#10b981;background:#10b981}
.fb-btn.todo .port-out{border-color:#f59e0b;background:transparent}
.fb-btn.conn{border-color:rgba(16,185,129,.35);color:#c0c0d8}
.fb-btn.todo{border-color:rgba(245,158,11,.3);color:#f59e0b}

/* Carousel */
.carousel{
  display:flex;gap:6px;overflow-x:auto;padding:3px 1px;margin-top:3px
}
.carousel::-webkit-scrollbar{height:3px}
.carousel::-webkit-scrollbar-thumb{background:#303048;border-radius:2px}
.cc{min-width:88px;background:#13131f;border:1px solid #2a2a3e;border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;transition:border-color .15s}
.cc:hover{border-color:#5050a0}
.cc-img{width:100%;height:54px;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#20203a,#15152a)}
.cc-info{padding:5px 5px 2px;direction:rtl}
.cc-name{font-size:8px;font-weight:700;color:#c0c0d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-price{font-size:8px;color:#10b981;font-weight:700}
.cc-old{font-size:7px;color:#4a4a6a;text-decoration:line-through}
.cc-btn{background:#252540;color:#7070a8;font-size:8px;padding:4px;text-align:center;border-top:1px solid #2a2a3e}

/* ── Detail panel ────────────────────────────────────────── */
#detail{
  position:fixed;top:52px;right:0;bottom:0;width:320px;
  background:#13131f;border-left:1px solid #2a2a3e;
  overflow-y:auto;z-index:500;
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column
}
#detail.open{transform:translateX(0)}
#detail-head{
  padding:16px 16px 12px;border-bottom:1px solid #2a2a3e;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
#detail-title{font-size:14px;font-weight:900;color:#fff;direction:rtl}
#detail-close{background:none;border:none;color:#5a5a7a;font-size:18px;cursor:pointer;line-height:1}
#detail-close:hover{color:#fff}
#detail-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;flex:1}

.det-section{background:#1e1e2e;border-radius:10px;padding:12px}
.det-section h4{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#5a5a7a;margin-bottom:8px;direction:rtl}
.det-section p,.det-section li{font-size:12px;color:#b0b0cc;line-height:1.6;direction:rtl;text-align:right}
.det-section ul{padding-right:16px;display:flex;flex-direction:column;gap:3px}
.det-code{
  background:#0d0d1a;border:1px solid #2a2a3e;border-radius:8px;
  padding:10px;font-family:monospace;font-size:11px;color:#a5d6ff;
  direction:ltr;text-align:left;white-space:pre;overflow-x:auto;
  position:relative;margin-top:6px
}
.copy-btn{
  position:absolute;top:6px;right:6px;
  background:#6366f1;color:#fff;border:none;border-radius:5px;
  padding:3px 8px;font-size:10px;cursor:pointer;font-weight:700
}
.copy-btn:hover{opacity:.85}
.status-line{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;font-size:12px;direction:rtl
}
.status-line.ok   {background:rgba(16,185,129,.1);color:#10b981}
.status-line.warn {background:rgba(245,158,11,.1);color:#f59e0b}
.status-line.err  {background:rgba(239,68,68,.1); color:#ef4444}
.status-line.info {background:rgba(99,102,241,.1);color:#818cf8}

/* ── Zoom controls ───────────────────────────────────────── */
#zoom{
  position:fixed;bottom:20px;left:20px;
  display:flex;flex-direction:column;gap:4px;z-index:900
}
.z-btn{
  width:34px;height:34px;background:#1e1e2e;border:1px solid #2a2a3e;
  border-radius:8px;color:#a0a0c0;font-size:16px;display:flex;
  align-items:center;justify-content:center;cursor:pointer
}
.z-btn:hover{background:#2a2a3e;color:#fff}
.z-lvl{
  background:#1e1e2e;border:1px solid #2a2a3e;border-radius:8px;
  color:#5a5a7a;font-size:10px;text-align:center;padding:4px 0;cursor:default

/* ── Legend ──────────────────────────────────────────────── */
#legend{
  position:fixed;bottom:20px;right:340px;
  background:#1e1e2e;border:1px solid #2a2a3e;border-radius:12px;
  padding:10px 14px;font-size:11px;z-index:900;
  display:flex;gap:14px;flex-wrap:wrap;direction:rtl;
  transition:right .25s
}
#legend.shifted{right:20px}
.leg-item{display:flex;align-items:center;gap:5px;color:#8080a0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#13131f}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
</style>
</head>

// ═══════════════════════════════════════════════════════════
//  RENDER NODES
// ═══════════════════════════════════════════════════════════

const nodeMap = {};

function renderNodes() {
  const container = document.getElementById('nodes');
  NODES.forEach(n => {
    nodeMap[n.id] = n;
    const el = document.createElement('div');
    el.className = `nd ${n.status}`;
    el.id = `nd-${n.id}`;
    el.style.left = n.x + 'px';
    el.style.top  = n.y + 'px';
    el.innerHTML  = buildNode(n);
    el.addEventListener('click', () => openDetail(n.id));
    container.appendChild(el);
    n._el = el;
  });
}

function buildNode(n) {
  let html = `
    <div class="nd-head">
      <span class="nd-platform ${n.platform}">${n.platformLabel}</span>
      <span class="nd-name">${n.title}</span>
      <span class="nd-dot"></span>
    </div>
    <div class="nd-body">`;

  n.sections.forEach(s => {
    html += `<div class="nr">
      <div class="nr-lbl">${s.icon || ''} ${s.lbl}</div>`;

    if (s.carousel) {
      html += `<div class="carousel">`;
      s.carousel.forEach(c => {
        html += `
          <div class="cc" data-to="${c.to}" onclick="event.stopPropagation();openDetail('${c.to}')">
            <div class="cc-img">${c.emoji}</div>
            <div class="cc-info">
              <div class="cc-name">${c.name}</div>
              <div class="cc-price">${c.price}</div>
              ${c.old ? `<div class="cc-old">${c.old}</div>` : ''}
            </div>
            <div class="cc-btn">عرض التفاصيل ◀</div>
          </div>`;
      });
      html += `</div>`;
    } else if (s.buttons) {
      html += `<div class="btn-list">`;
      s.buttons.forEach(b => {
        html += `<div class="fb-btn ${b.status}" onclick="event.stopPropagation();openDetail('${b.to}')">
          <span>${b.text}</span>
          <span class="port-out"></span>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="nr-txt ${s.cls||''}">${s.txt}</div>`;
    }

    html += `</div>`; // .nr
  });

  html += `</div>`; // .nd-body
  return html;
}

// ═══════════════════════════════════════════════════════════
//  RENDER CONNECTIONS (SVG)
// ═══════════════════════════════════════════════════════════

function renderConnections() {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';

  // Section labels
  const labels = [
    { x:80,   y:1510, text:'SYSTEM FLOWS — بيبعتهم السيستم تلقائياً' },
    { x:1310, y:510,  text:'تفاصيل المنتجات' },
    { x:900,  y:40,   text:'كتالوجات المنتجات' },
  ];
  labels.forEach(l => {
    const t = document.createElement('div');
    t.className = 'sec-label';
    t.style.left = l.x+'px';
    t.style.top  = (l.y-20)+'px';
    t.textContent = l.text;
    document.getElementById('nodes').appendChild(t);
  });

  CONNS.forEach(c => {
    const fn = nodeMap[c.from];
    const tn = nodeMap[c.to];
    if (!fn || !tn) return;

    const x1 = fn.x + 258; // right edge of from node
    const y1 = c.fy;
    const x2 = tn.x;       // left edge of to node
    const y2 = c.ty;

    const cp1x = x1 + Math.abs(x2-x1)*0.45;
    const cp2x = x2 - Math.abs(x2-x1)*0.45;

    // Path
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${cp1x},${y1} ${cp2x},${y2} ${x2},${y2}`);
    path.setAttribute('stroke', c.color);
    path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-opacity','0.6');
    svg.appendChild(path);

    // Dot at start
    const d1 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    d1.setAttribute('cx', x1); d1.setAttribute('cy', y1);
    d1.setAttribute('r','3.5'); d1.setAttribute('fill', c.color);
    svg.appendChild(d1);

    // Arrowhead at end
    const angle = Math.atan2(y2 - (y1+y2)/2, x2 - (x1+x2)/2);
    const aSize = 7;
    const ax = x2, ay = y2;
    const ax1 = ax - aSize*Math.cos(angle-0.4);
    const ay1 = ay - aSize*Math.sin(angle-0.4);
    const ax2 = ax - aSize*Math.cos(angle+0.4);
    const ay2 = ay - aSize*Math.sin(angle+0.4);
    const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    arrow.setAttribute('points',`${ax},${ay} ${ax1},${ay1} ${ax2},${ay2}`);
    arrow.setAttribute('fill', c.color);
    arrow.setAttribute('fill-opacity','0.8');
    svg.appendChild(arrow);

    // Label (midpoint)
    if (c.lbl) {
      const mx = (x1+x2)/2, my = (y1+y2)/2 - 10;
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', mx); txt.setAttribute('y', my);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('fill', c.color);
      txt.setAttribute('font-size','9');
      txt.setAttribute('font-weight','700');
      txt.setAttribute('opacity','0.7');
      txt.textContent = c.lbl;
      svg.appendChild(txt);
    }
  });
}

let activeId = null;

function openDetail(id) {
  const n = nodeMap[id];
  if (!n || !n.detail) return;
  const d = n.detail;

  activeId = id;
  document.querySelectorAll('.nd').forEach(e => e.classList.remove('active'));
  const el = document.getElementById(`nd-${id}`);
  if (el) el.classList.add('active');

  document.getElementById('detail-title').textContent = n.title;

  const statusText = { done:'مكتمل ✅', partial:'محتاج تعديل ⚡', missing:'لازم تنشئه ❌', system:'System Flow 🤖' };
  const statusCls  = { done:'ok', partial:'warn', missing:'err', system:'info' };

  let html = `
    <div class="det-section">
      <h4>الحالة</h4>
      <div class="status-line ${statusCls[n.status]||'warn'}">${statusText[n.status]||''}</div>
    </div>
    <div class="det-section">
      <h4>الخطوات المطلوبة</h4>`;

  d.steps.forEach(s => {
    html += `<div class="status-line ${s.type}" style="margin-bottom:5px;white-space:pre-wrap">${s.text}</div>`;
  });
  html += `</div>`;

  if (d.json) {
    const esc = d.json.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `
      <div class="det-section">
        <h4>JSON للـ External Request</h4>
        <p style="font-size:11px;color:#5a5a7a;margin-bottom:4px">Method: POST — URL:</p>
        <div style="font-family:monospace;font-size:10px;color:#5eead4;background:#0d0d1a;padding:6px 8px;border-radius:6px;direction:ltr;margin-bottom:6px;word-break:break-all">${BACKEND}/api/events</div>
        <p style="font-size:11px;color:#5a5a7a;margin-bottom:4px">Body:</p>
        <div class="det-code" id="jc-${id}"><button class="copy-btn" onclick="copyCode('jc-${id}')">نسخ</button>${esc}</div>
      </div>`;
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
  document.getElementById('legend').classList.remove('shifted');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('legend').classList.add('shifted');
  document.querySelectorAll('.nd').forEach(e => e.classList.remove('active'));
  activeId = null;
}

function copyCode(id) {
  const el = document.getElementById(id);
  const btn = el.querySelector('.copy-btn');
  const txt = el.textContent.replace('نسخ','').trim();
  navigator.clipboard.writeText(txt).then(() => {
    btn.textContent = '✓ تم';
    setTimeout(() => btn.textContent = 'نسخ', 1500);
  });
}

// ═══════════════════════════════════════════════════════════
//  PAN & ZOOM
// ═══════════════════════════════════════════════════════════

let tx = 0, ty = 52, tz = 0.72;
let dragging = false, mx0, my0, tx0, ty0;

function applyTransform() {
  document.getElementById('canvas').style.transform =
    `translate(${tx}px,${ty}px) scale(${tz})`;
  document.getElementById('zlvl').textContent = Math.round(tz*100)+'%';
}

function resetView() {
  tx = 30; ty = 62; tz = 0.68;
  applyTransform();
}

function zoom(factor) {
  const newZ = Math.min(2, Math.max(0.3, tz * factor));
  const cx = window.innerWidth/2, cy = (window.innerHeight+52)/2;
  tx = cx - (cx - tx) * (newZ/tz);
  ty = cy - (cy - ty) * (newZ/tz);
  tz = newZ;
  applyTransform();
}

const wrap = document.getElementById('wrap');

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.nd') || e.target.closest('#detail')) return;
  dragging = true;
  mx0 = e.clientX; my0 = e.clientY;
  tx0 = tx; ty0 = ty;
  wrap.classList.add('drag');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = tx0 + (e.clientX - mx0);
  ty = ty0 + (e.clientY - my0);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('drag'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZ = Math.min(2, Math.max(0.3, tz * factor));
  tx = e.clientX - (e.clientX - tx) * (newZ/tz);
  ty = e.clientY - (e.clientY - ty) * (newZ/tz);
  tz = newZ;
  applyTransform();
}, { passive: false });

// Touch
let lt = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    mx0 = e.touches[0].clientX; my0 = e.touches[0].clientY;
    tx0 = tx; ty0 = ty;
  } else if (e.touches.length === 2) {
    lt = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
});
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tx = tx0 + (e.touches[0].clientX - mx0);
    ty = ty0 + (e.touches[0].clientY - my0);
    applyTransform();
  } else if (e.touches.length === 2 && lt) {
    const nd = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    zoom(nd/lt); lt = nd;
  }
}, { passive: false });
wrap.addEventListener('touchend', () => { dragging = false; lt = null; });
